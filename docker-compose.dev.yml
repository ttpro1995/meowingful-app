version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: meowingful-postgres-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: meowingful
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API (Development mode with hot reload)
  backend:
    build:
      context: ./back-end
      dockerfile: Dockerfile.dev
    container_name: meowingful-backend-dev
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/meowingful?schema=public
      NODE_ENV: development
    volumes:
      - ./back-end:/app
      - /app/node_modules
    ports:
      - "3500:3000"
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run start:dev
    restart: unless-stopped

volumes:
  postgres_data_dev:
