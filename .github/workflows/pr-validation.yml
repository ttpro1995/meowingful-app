name: PR Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [master]

jobs:
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: back-end/package-lock.json

      - name: Install backend dependencies
        run: |
          cd back-end
          npm ci
          npx prisma generate

      - name: Run backend lint (no warnings allowed)
        run: |
          cd back-end
          npm run lint -- --max-warnings 0

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: front-end/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd front-end
          npm ci

      - name: Run frontend lint (no warnings allowed)
        run: |
          cd front-end
          npm run lint -- --max-warnings 0

  backend-unit-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    needs: [backend-lint]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: back-end/package-lock.json

      - name: Install backend dependencies
        run: |
          cd back-end
          npm ci
          npx prisma generate

      - name: Run backend unit tests
        run: |
          cd back-end
          npm run test

  frontend-unit-tests:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    needs: [frontend-lint]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: front-end/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd front-end
          npm ci

      - name: Run frontend unit tests
        run: |
          cd front-end
          npm run test:run

  backend-coverage:
    name: Backend Coverage Check
    runs-on: ubuntu-latest
    needs: [backend-unit-tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: back-end/package-lock.json

      - name: Install backend dependencies
        run: |
          cd back-end
          npm ci
          npx prisma generate

      - name: Run backend tests with coverage
        run: |
          cd back-end
          npm run test:cov

      - name: Check backend coverage threshold
        run: |
          cd back-end
          # Extract coverage percentage from Jest output
          COVERAGE=$(npx jest --coverage --silent | grep "All files" | grep -o '[0-9]\+\.[0-9]\+' | head -1)
          echo "Coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE < 70" | bc -l) )); then
            echo "❌ Coverage $COVERAGE% is below required 70%"
            exit 1
          else
            echo "✅ Coverage $COVERAGE% meets the 70% requirement"
          fi

  frontend-coverage:
    name: Frontend Coverage Check
    runs-on: ubuntu-latest
    needs: [frontend-unit-tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: front-end/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd front-end
          npm ci

      - name: Run frontend tests with coverage
        run: |
          cd front-end
          npx vitest run --coverage

      - name: Check frontend coverage threshold
        run: |
          cd front-end
          # Extract coverage percentage from vitest coverage report
          if [ -f coverage/coverage-summary.json ]; then
            COVERAGE=$(node -e "const fs=require('fs'); const cov=JSON.parse(fs.readFileSync('coverage/coverage-summary.json')); console.log(cov.total.lines.pct);")
            echo "Coverage: $COVERAGE%"
            if (( $(echo "$COVERAGE < 65" | bc -l) )); then
              echo "❌ Coverage $COVERAGE% is below required 65%"
              exit 1
            else
              echo "✅ Coverage $COVERAGE% meets the 65% requirement"
            fi
          else
            echo "❌ Coverage report not found"
            exit 1
          fi

  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: [backend-lint, frontend-lint]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        run: |
          docker build -t meowingful-backend:pr-${{ github.event.pull_request.number }} ./back-end

      - name: Build frontend Docker image
        run: |
          docker build -t meowingful-frontend:pr-${{ github.event.pull_request.number }} ./front-end

  backend-regression-tests:
    name: Backend Regression Tests (E2E)
    runs-on: ubuntu-latest
    needs: [backend-unit-tests]
    continue-on-error: true
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready --health-interval 5s --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli -a redis-password ping" --health-interval 5s --health-timeout 5s
          --health-retries 5
        command: ["redis-server", "--requirepass", "redis-password"]
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/test_db?schema=public
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      REDIS_PASSWORD: redis-password
      JWT_SECRET: test-jwt-secret-for-e2e-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: back-end/package-lock.json

      - name: Install backend dependencies
        run: |
          cd back-end
          npm ci
          npx prisma generate

      - name: Run Prisma migrations
        run: |
          cd back-end
          npx prisma migrate deploy

      - name: Run backend regression tests (E2E)
        run: |
          cd back-end
          npm run test:e2e

  # Summary job that all required checks must pass
  pr-validation-complete:
    name: PR Validation Complete
    runs-on: ubuntu-latest
    needs: [
      backend-lint,
      frontend-lint,
      backend-unit-tests,
      frontend-unit-tests,
      backend-coverage,
      frontend-coverage,
      docker-build,
      backend-regression-tests
    ]
    steps:
      - name: All required checks passed
        run: echo "✅ All required PR validation checks have passed"